name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''
            label: Windows x64
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            target: aarch64-pc-windows-msvc
            label: Windows ARM64
          - platform: ubuntu-24.04
            args: ''
            target: ''
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target || matrix.platform }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            pkg-config \
            libclang-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Inspectre ${{ github.ref_name }}'
          releaseBody: 'Baixe o instalador correspondente à sua plataforma nos artefatos abaixo.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Remove sufixo de língua do MSI no release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          target_dir="${{ matrix.target }}"
          if [ -n "$target_dir" ]; then
            bundle_dir="src-tauri/target/$target_dir/release/bundle/msi"
          else
            bundle_dir="src-tauri/target/release/bundle/msi"
          fi
          for src in "$bundle_dir"/*_en-US.msi; do
            [ -f "$src" ] || continue
            old_name=$(basename "$src")
            new_name="${old_name/_en-US/}"
            tmp_path="$RUNNER_TEMP/$new_name"
            cp "$src" "$tmp_path"
            gh release delete-asset "$TAG" "$old_name" --yes || true
            gh release upload "$TAG" "$tmp_path" --clobber
          done
